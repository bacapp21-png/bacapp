<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تحميل تطبيق BAC app </title>
<style>
  body {
    font-family: -apple-system, "Segoe UI", Tahoma, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    background: #f5f6fa;
    text-align: center;
    padding: 20px;
    box-sizing: border-box;
  }
  h1 { font-size: 20px; margin-bottom: 8px; }
  p { color: #555; margin-bottom: 24px; }
  .links { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  a.btn {
    display: inline-block;
    padding: 12px 24px;
    border-radius: 8px;
    background: #1a73e8;
    color: #fff;
    text-decoration: none;
    font-weight: bold;
  }
</style>
</head>
<body>
  <h1>جاري تحويلك لتحميل تطبيق BAC app...</h1>
  <p>إن لم يتم تحويلك تلقائيًا، اختر متجرك:</p>
  <div class="links">
    <a class="btn" href="https://play.google.com/store/apps/details?id=com.bac.com">Google Play</a>
    <a class="btn" href="https://apps.apple.com/app/bac-app/id6738507573">App Store</a>
  </div>

<script>
  var ua = navigator.userAgent || navigator.vendor || window.opera;
  var androidUrl = "https://play.google.com/store/apps/details?id=com.bac.com";
  var iosUrl = "https://apps.apple.com/app/bac-app/id6738507573";

  if (/android/i.test(ua)) {
    window.location.href = androidUrl;
  } else if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {
    window.location.href = iosUrl;
  }
  // غير ذلك (كمبيوتر مكتبي): تبقى الصفحة تعرض الخيارين
</script>
</body>
</html>
